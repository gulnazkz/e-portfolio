<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>«Сандық карточкалар»</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Bricolage Grotesque', sans-serif;
    background: linear-gradient(135deg, #D4EDDA 0%, #FFFAF3 50%, #FFE5D0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    color: #1A1A1A;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(2rem, 5vw, 3rem); text-align: center; margin-bottom: 0.5rem; color: #1B8B5A; font-weight: 800; }
  .subtitle { text-align: center; font-size: 1.15rem; font-weight: 600; color: #4A4A4A; margin-bottom: 2rem; }
  .score-bar { display: flex; justify-content: center; gap: 2rem; background: #fff; border: 3px solid #1A1A1A; padding: 1rem 1.5rem; margin-bottom: 1.5rem; box-shadow: 5px 5px 0 #1A1A1A; }
  .score { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 800; color: #1B8B5A; }
  .display-box {
    background: #1A1A1A;
    color: #FFF7ED;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
    box-shadow: 5px 5px 0 #1B8B5A;
    border: 3px solid #1A1A1A;
  }
  .label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.15em; color: #34D399; margin-bottom: 0.5rem; font-weight: 700; }
  .emoji-row {
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 1.3;
    word-spacing: 0.3em;
    letter-spacing: 0.05em;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .question-prompt { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700; margin-top: 1rem; color: #FF6B1A; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.7rem; margin-bottom: 1.5rem; }
  @media (max-width: 500px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  .num-card {
    aspect-ratio: 1;
    background: #fff;
    border: 3px solid #1A1A1A;
    box-shadow: 4px 4px 0 #1A1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    color: #1A1A1A;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .num-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #1B8B5A; background: #FFE5D0; }
  .num-card.correct { background: #D4EDDA; border-color: #1B8B5A; box-shadow: 4px 4px 0 #1B8B5A; animation: pulse 0.5s; }
  .num-card.wrong { background: #FECACA; border-color: #DC2626; animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
  @keyframes pulse { 50% { transform: scale(1.12); } }
  .controls { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
  .btn {
    background: #1B8B5A;
    color: #fff;
    border: 3px solid #1A1A1A;
    padding: 0.9rem 1.5rem;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1A1A1A;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #1A1A1A; }
  .win-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .win-modal.active { display: flex; }
  .win-content { background: #FFF7ED; border: 4px solid #1A1A1A; padding: 2.5rem 2rem; text-align: center; max-width: 450px; box-shadow: 10px 10px 0 #1B8B5A; }
  .win-emoji { font-size: 5rem; margin-bottom: 1rem; }
  .win-title { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 800; color: #1B8B5A; margin-bottom: 0.8rem; }
  .win-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<div class="container">
  <h1>«Сандық карточкалар»</h1>
  <p class="subtitle">Объектілерді санап, дұрыс санды табыңыз</p>

  <div class="score-bar">
    <div class="score">⭐ <span id="score">0</span> / <span id="total">5</span></div>
  </div>

  <div class="display-box">
    <div class="label">САНА</div>
    <div class="emoji-row" id="emojiRow"></div>
    <div class="question-prompt">Қанша объект бар?</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="controls">
    <button class="btn" onclick="restart()">🔄 Жаңадан</button>
  </div>
</div>

<div class="win-modal" id="winModal">
  <div class="win-content">
    <div class="win-emoji">🎉</div>
    <div class="win-title">Тамаша!</div>
    <div class="win-text" id="winText"></div>
    <button class="btn" onclick="restart()">Қайтадан ойнау</button>
  </div>
</div>

<script>
  const emojiList = ['🍎', '🌸', '⭐', '🐰', '🍓', '🎈', '🦋', '🌻', '🍒', '🐭'];
  let score = 0;
  let round = 0;
  const TOTAL = 5;
  let currentAnswer = 0;

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function init() {
    score = 0;
    round = 0;
    document.getElementById('score').textContent = score;
    document.getElementById('total').textContent = TOTAL;
    nextRound();
  }

  function nextRound() {
    if (round >= TOTAL) {
      document.getElementById('winText').textContent = `Барлығы дұрыс! Балл: ${score}/${TOTAL}`;
      document.getElementById('winModal').classList.add('active');
      return;
    }
    currentAnswer = rand(1, 5);
    const emoji = emojiList[rand(0, emojiList.length - 1)];
    document.getElementById('emojiRow').textContent = emoji.repeat(currentAnswer);
    renderNumbers();
  }

  function renderNumbers() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let n = 1; n <= 5; n++) {
      const card = document.createElement('div');
      card.className = 'num-card';
      card.textContent = n;
      card.onclick = () => handleClick(n, card);
      grid.appendChild(card);
    }
  }

  function handleClick(num, card) {
    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;
    if (num === currentAnswer) {
      card.classList.add('correct');
      score++;
      round++;
      document.getElementById('score').textContent = score;
      setTimeout(nextRound, 800);
    } else {
      card.classList.add('wrong');
      setTimeout(() => card.classList.remove('wrong'), 500);
    }
  }

  function restart() {
    document.getElementById('winModal').classList.remove('active');
    init();
  }

  init();
</script>

</body>
</html>
