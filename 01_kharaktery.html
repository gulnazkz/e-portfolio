<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>«Кейіпкерлерді тап» — Үйшік ертегісі</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Bricolage Grotesque', sans-serif;
    background: linear-gradient(135deg, #FFE5D0 0%, #FFF7ED 50%, #D4EDDA 100%);
    min-height: 100vh;
    padding: 1.5rem;
    color: #1A1A1A;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    text-align: center;
    margin-bottom: 0.5rem;
    color: #E8590C;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 600;
    color: #4A4A4A;
    margin-bottom: 2rem;
  }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    border: 3px solid #1A1A1A;
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 5px 5px 0 #1A1A1A;
  }
  .score, .lives {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 800;
  }
  .score { color: #1B8B5A; }
  .lives { color: #E8590C; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  .card {
    aspect-ratio: 1;
    background: #fff;
    border: 3px solid #1A1A1A;
    box-shadow: 4px 4px 0 #1A1A1A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #E8590C; }
  .card.selected { background: #FFE5D0; border-color: #E8590C; box-shadow: 4px 4px 0 #E8590C; }
  .card.correct { background: #D4EDDA; border-color: #1B8B5A; pointer-events: none; opacity: 0.7; }
  .card.wrong { background: #FECACA; border-color: #DC2626; animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .card-emoji { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 0.4rem; }
  .card-name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; }
  .card-hidden .card-emoji,
  .card-hidden .card-name { visibility: hidden; }
  .question-box {
    background: #1A1A1A;
    color: #FFF7ED;
    border: 3px solid #1A1A1A;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
    box-shadow: 5px 5px 0 #E8590C;
  }
  .question-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #FF6B1A;
    margin-bottom: 0.5rem;
    font-weight: 700;
  }
  .question {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
  }
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2rem;
  }
  .btn {
    background: #E8590C;
    color: #fff;
    border: 3px solid #1A1A1A;
    padding: 0.9rem 1.5rem;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1A1A1A;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #1A1A1A; }
  .btn.secondary { background: #fff; color: #1A1A1A; }
  .win-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .win-modal.active { display: flex; }
  .win-content {
    background: #FFF7ED;
    border: 4px solid #1A1A1A;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 450px;
    box-shadow: 10px 10px 0 #E8590C;
  }
  .win-emoji { font-size: 5rem; margin-bottom: 1rem; }
  .win-title { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 800; color: #E8590C; margin-bottom: 0.8rem; }
  .win-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: #1A1A1A; }
</style>
</head>
<body>

<div class="container">
  <h1>«Кейіпкерлерді тап»</h1>
  <p class="subtitle">Үйшік ертегісінің кейіпкерлерін табыңыз</p>

  <div class="score-bar">
    <div class="score">⭐ <span id="score">0</span></div>
    <div class="lives">❤️ <span id="lives">3</span></div>
  </div>

  <div class="question-box">
    <div class="question-label">ТАПСЫРМА</div>
    <div class="question" id="question">«<span id="targetName">Аю</span>» кейіпкерін табыңыз</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="controls">
    <button class="btn" onclick="restart()">🔄 Қайтадан бастау</button>
  </div>
</div>

<div class="win-modal" id="winModal">
  <div class="win-content">
    <div class="win-emoji" id="winEmoji">🏆</div>
    <div class="win-title" id="winTitle">Жарайсыңдар!</div>
    <div class="win-text" id="winText">Барлық кейіпкерлерді таптыңыздар!</div>
    <button class="btn" onclick="restart()">Қайтадан ойнау</button>
  </div>
</div>

<script>
  const characters = [
    { emoji: '🐭', name: 'Тышқан' },
    { emoji: '🐸', name: 'Бақа' },
    { emoji: '🐰', name: 'Қоян' },
    { emoji: '🦊', name: 'Түлкі' },
    { emoji: '🐺', name: 'Қасқыр' },
    { emoji: '🐻', name: 'Аю' },
  ];

  let score = 0;
  let lives = 3;
  let targetIndex = 0;
  let order = [];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function init() {
    score = 0;
    lives = 3;
    targetIndex = 0;
    order = shuffle([0, 1, 2, 3, 4, 5]);
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    renderGrid();
    nextQuestion();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    characters.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-emoji">${ch.emoji}</div><div class="card-name">${ch.name}</div>`;
      card.onclick = () => handleClick(i, card);
      grid.appendChild(card);
    });
  }

  function nextQuestion() {
    if (targetIndex >= order.length) {
      showWin('🏆', 'Жарайсыңдар!', `Барлық кейіпкерлерді таптыңыздар! Балл: ${score}`);
      return;
    }
    const target = characters[order[targetIndex]];
    document.getElementById('targetName').textContent = target.name;
  }

  function handleClick(idx, card) {
    if (card.classList.contains('correct')) return;
    const target = order[targetIndex];
    if (idx === target) {
      card.classList.add('correct');
      score += 10;
      document.getElementById('score').textContent = score;
      targetIndex++;
      setTimeout(nextQuestion, 600);
    } else {
      card.classList.add('wrong');
      lives--;
      document.getElementById('lives').textContent = lives;
      setTimeout(() => card.classList.remove('wrong'), 500);
      if (lives <= 0) {
        showWin('😊', 'Тағы көріңіздер!', `Балл: ${score}. Тағы да ойнаңыздар!`);
      }
    }
  }

  function showWin(emoji, title, text) {
    document.getElementById('winEmoji').textContent = emoji;
    document.getElementById('winTitle').textContent = title;
    document.getElementById('winText').textContent = text;
    document.getElementById('winModal').classList.add('active');
  }

  function restart() {
    document.getElementById('winModal').classList.remove('active');
    init();
  }

  init();
</script>

</body>
</html>
