<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>«Не артық?» — Танымдық ойын</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Bricolage Grotesque', sans-serif;
    background: linear-gradient(135deg, #D4EDDA 0%, #FFF7ED 50%, #FFE5D0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    color: #1A1A1A;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    text-align: center;
    margin-bottom: 0.5rem;
    color: #1B8B5A;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 600;
    color: #4A4A4A;
    margin-bottom: 2rem;
  }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    border: 3px solid #1A1A1A;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 5px 5px 0 #1A1A1A;
  }
  .score, .level {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 800;
  }
  .score { color: #1B8B5A; }
  .level { color: #E8590C; }
  .question-box {
    background: #1A1A1A;
    color: #FFF7ED;
    padding: 1.4rem;
    text-align: center;
    margin-bottom: 1.5rem;
    box-shadow: 5px 5px 0 #1B8B5A;
    border: 3px solid #1A1A1A;
  }
  .question-text {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .card {
    aspect-ratio: 1;
    background: #fff;
    border: 3px solid #1A1A1A;
    box-shadow: 5px 5px 0 #1A1A1A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .card:hover { transform: translate(-3px, -3px); box-shadow: 7px 7px 0 #1B8B5A; }
  .card.correct { background: #D4EDDA; border-color: #1B8B5A; box-shadow: 5px 5px 0 #1B8B5A; animation: pulse 0.5s; }
  .card.wrong { background: #FECACA; border-color: #DC2626; animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  @keyframes pulse { 50% { transform: scale(1.05); } }
  .card-emoji { font-size: clamp(3rem, 10vw, 5rem); }
  .card-name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; margin-top: 0.5rem; }
  .hint {
    text-align: center;
    font-size: 0.9rem;
    color: #4A4A4A;
    font-weight: 600;
    margin-top: 1rem;
  }
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2rem;
  }
  .btn {
    background: #1B8B5A;
    color: #fff;
    border: 3px solid #1A1A1A;
    padding: 0.9rem 1.5rem;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1A1A1A;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #1A1A1A; }
  .win-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .win-modal.active { display: flex; }
  .win-content {
    background: #FFF7ED;
    border: 4px solid #1A1A1A;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 450px;
    box-shadow: 10px 10px 0 #1B8B5A;
  }
  .win-emoji { font-size: 5rem; margin-bottom: 1rem; }
  .win-title { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 800; color: #1B8B5A; margin-bottom: 0.8rem; }
  .win-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<div class="container">
  <h1>«Не артық?»</h1>
  <p class="subtitle">Топта артық суретті табыңыз</p>

  <div class="score-bar">
    <div class="score">⭐ Балл: <span id="score">0</span></div>
    <div class="level">Деңгей: <span id="level">1</span> / 5</div>
  </div>

  <div class="question-box">
    <div class="question-text" id="questionText">Қайсысы артық?</div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="hint" id="hint">Жақсылап ойлап, артық суретті табыңыз</div>

  <div class="controls">
    <button class="btn" onclick="restart()">🔄 Жаңадан</button>
  </div>
</div>

<div class="win-modal" id="winModal">
  <div class="win-content">
    <div class="win-emoji" id="winEmoji">🏆</div>
    <div class="win-title" id="winTitle">Тамаша!</div>
    <div class="win-text" id="winText"></div>
    <button class="btn" onclick="restart()">Қайтадан ойнау</button>
  </div>
</div>

<script>
  // Each level: 4 items, one is the "odd one out"
  const levels = [
    {
      question: 'Қайсысы жабайы аң ЕМЕС?',
      items: [
        { emoji: '🐺', name: 'Қасқыр', odd: false },
        { emoji: '🦊', name: 'Түлкі', odd: false },
        { emoji: '🐻', name: 'Аю', odd: false },
        { emoji: '🐄', name: 'Сиыр', odd: true },
      ],
      hint: 'Бір жануар үй жануары!'
    },
    {
      question: 'Қайсысы ертегі кейіпкері ЕМЕС?',
      items: [
        { emoji: '🐭', name: 'Тышқан', odd: false },
        { emoji: '🐸', name: 'Бақа', odd: false },
        { emoji: '🐰', name: 'Қоян', odd: false },
        { emoji: '🦒', name: 'Жираф', odd: true },
      ],
      hint: 'Жираф Үйшік ертегісінде жоқ!'
    },
    {
      question: 'Қайсысы артық? (түсі бойынша)',
      items: [
        { emoji: '🟠', name: 'Қызғылт-сары', odd: false },
        { emoji: '🟧', name: 'Қызғылт-сары', odd: false },
        { emoji: '🍊', name: 'Қызғылт-сары', odd: false },
        { emoji: '🟦', name: 'Көк', odd: true },
      ],
      hint: 'Бір түс басқа!'
    },
    {
      question: 'Қайсысы артық? (саны бойынша)',
      items: [
        { emoji: '⭐', name: 'Бір жұлдыз', odd: true },
        { emoji: '⭐⭐', name: 'Екі жұлдыз', odd: false },
        { emoji: '⭐⭐⭐', name: 'Үш жұлдыз', odd: false },
        { emoji: '⭐⭐⭐⭐', name: 'Төрт жұлдыз', odd: false },
      ],
      hint: 'Қайсысында тек 1 жұлдыз бар?'
    },
    {
      question: 'Қайсысы тағам ЕМЕС?',
      items: [
        { emoji: '🍎', name: 'Алма', odd: false },
        { emoji: '🍌', name: 'Банан', odd: false },
        { emoji: '🚗', name: 'Көлік', odd: true },
        { emoji: '🍇', name: 'Жүзім', odd: false },
      ],
      hint: 'Көлікті жеуге болмайды!'
    },
  ];

  let score = 0;
  let currentLevel = 0;

  function init() {
    score = 0;
    currentLevel = 0;
    document.getElementById('score').textContent = score;
    showLevel();
  }

  function showLevel() {
    if (currentLevel >= levels.length) {
      showWin('🏆', 'Тамаша!', `Барлық деңгейді өттіңіздер! Балл: ${score}/50`);
      return;
    }
    const lvl = levels[currentLevel];
    document.getElementById('level').textContent = currentLevel + 1;
    document.getElementById('questionText').textContent = lvl.question;
    document.getElementById('hint').textContent = lvl.hint;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    // Shuffle items
    const items = [...lvl.items].sort(() => Math.random() - 0.5);
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-emoji">${item.emoji}</div><div class="card-name">${item.name}</div>`;
      card.onclick = () => handleClick(item, card);
      grid.appendChild(card);
    });
  }

  function handleClick(item, card) {
    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;
    if (item.odd) {
      card.classList.add('correct');
      score += 10;
      document.getElementById('score').textContent = score;
      currentLevel++;
      setTimeout(showLevel, 900);
    } else {
      card.classList.add('wrong');
      setTimeout(() => card.classList.remove('wrong'), 500);
    }
  }

  function showWin(emoji, title, text) {
    document.getElementById('winEmoji').textContent = emoji;
    document.getElementById('winTitle').textContent = title;
    document.getElementById('winText').textContent = text;
    document.getElementById('winModal').classList.add('active');
  }

  function restart() {
    document.getElementById('winModal').classList.remove('active');
    init();
  }

  init();
</script>

</body>
</html>
